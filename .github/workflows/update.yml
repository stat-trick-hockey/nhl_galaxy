name: Update Galaxy

on:
  schedule:
    - cron: "0 9 * * *"

  workflow_dispatch:

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - run: pip install -r requirements.txt

      - run: python scripts/fetch_goals.py
      - run: python scripts/build_galaxy.py

      - run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add site/embedded_goals.json
          git commit -m "update galaxy" || exit 0
          git push
